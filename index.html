<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raja Emperor | Premium Telegram Channel</title>

<meta name="description" content="Join Raja Emperor Premium Telegram Channel">
<meta name="theme-color" content="#0b1220">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
overflow-x:hidden;
}

.card{
width:100%;
max-width:430px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,215,0,.25);
border-radius:30px;
padding:35px 25px;
text-align:center;
box-shadow:0 20px 40px rgba(255,215,0,.15);
animation:fadeIn 1s ease;
}

.logo{
width:120px;
height:120px;
border-radius:50%;
border:5px solid #FFD700;
object-fit:cover;
box-shadow:0 0 25px rgba(255,215,0,.5);
margin:auto;
display:block;
}

.verify{
margin-top:15px;
display:inline-block;
padding:6px 15px;
background:#FFD700;
color:#000;
border-radius:50px;
font-size:14px;
font-weight:700;
}

h1{
margin-top:18px;
font-size:32px;
font-weight:700;
color:#FFD700;
}

.desc{
margin-top:10px;
font-size:15px;
line-height:1.8;
color:#ddd;
}

.stats{
display:flex;
justify-content:space-between;
margin-top:30px;
gap:15px;
}

.box{
flex:1;
background:rgba(255,255,255,.08);
padding:18px;
border-radius:18px;
}

.box h2{
font-size:26px;
color:#FFD700;
}

.box span{
font-size:13px;
color:#ccc;
}

.join{
display:block;
margin-top:35px;
padding:18px;
background:#FFD700;
color:#000;
text-decoration:none;
border-radius:60px;
font-size:20px;
font-weight:700;
transition:.3s;
}

.join:hover{
background:#FFC107;
transform:scale(1.05);
}

.note{
margin-top:20px;
font-size:13px;
color:#aaa;
}

.footer{
margin-top:25px;
font-size:12px;
color:#777;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}
</style>
</head>

<body>

<div class="card">

<img src="raja69.jpg" class="logo" alt="Raja Emperor">

<div class="verify">✔ Verified Channel</div>

<h1>Raja Emperor</h1>

<p class="desc">
🔥 Premium Cricket Prediction Channel<br>
🏆 Daily Match Tips<br>
💰 High Accuracy Predictions<br>
⚡ Fast Match Updates
</p>

<div class="stats">

<div class="box">
<h2 id="members">0</h2>
<span>Members</span>
</div>

<div class="box">
<h2>99%</h2>
<span>Accuracy</span>
</div>

</div>

<a class="join"
href="https://t.me/+kFxUG-ms9nQyM2Y1"
target="_blank">
🚀 JOIN TELEGRAM
</a>

<p class="note">
⚠️ Join the official Telegram channel for premium updates.
</p>

<div class="footer">
© 2026 Crick Emperor Raja Emperor. All Rights Reserved.
</div>

</div>

<script>

let count = 0;
let target = 71950;

let counter = setInterval(function(){

count += 50;

if(count >= target){
count = target;
clearInterval(counter);
}

document.getElementById("members").innerHTML =
count.toLocaleString() + "+";

},15);

</script>

</body>
</html>
